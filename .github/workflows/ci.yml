name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          bash -n docker-migrate.sh
          bash -n install.sh
          python3 scripts/check-embedded-web.py
      - name: Docker build check
        run: docker build -t docker-migrate-oneclick:test .
