name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          bash -n docker-migrate.sh
          bash -n install.sh
          shellcheck docker-migrate.sh install.sh
